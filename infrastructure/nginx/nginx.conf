server {
    listen 80;

    # Django → 사용자/전략/포트폴리오
    location /api/ {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # FastAPI → AI 엔진
    location /ai/ {
        proxy_pass         http://fastapi:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # SSE 스트리밍 지원
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}
