<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantra — 근거로 고르는 투자</title>
<style>
  :root{
    --ink:#102038;
    --paper:#f4f8fc;
    --paper-2:#e7f0fb;
    --line:#cddbf0;
    --moss:#4f8ee8;
    --moss-d:#2f6ecf;
    --amber:#73b5ff;
    --rose:#db5f6f;
    --muted:#647089;
    --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Pretendard","Segoe UI",-apple-system,sans-serif;background:linear-gradient(180deg,#fbfdff 0%,#f3f7fc 100%);color:var(--ink);line-height:1.48;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(205,219,240,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(205,219,240,.28) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,0));pointer-events:none}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

  header{padding:30px 0 22px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:12px}
  .logo{font-family:"Georgia",serif;font-size:28px;font-weight:700;letter-spacing:-.4px;color:var(--moss-d);text-decoration:none;cursor:pointer;border-radius:6px}
  .logo:focus-visible{outline:2px solid var(--moss);outline-offset:4px}
  .logo b{color:var(--amber)}
  .tag{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .lede{margin-top:14px;font-family:"Pretendard","Segoe UI",-apple-system,sans-serif;font-size:20px;line-height:1.45;color:var(--ink);max-width:720px;font-weight:500}
  .lede em{color:var(--moss-d);font-style:normal;border-bottom:1px solid rgba(47,110,207,.35)}

  .conn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font-size:12px;color:var(--muted);padding:5px 11px;background:rgba(231,240,251,.8);border:1px solid var(--line);border-radius:20px}
  .dot{width:7px;height:7px;border-radius:50%;background:#b9b3a3}
  .dot.live{background:var(--moss);box-shadow:0 0 0 3px rgba(47,107,79,.18)}
  .dot.mock{background:var(--amber);box-shadow:0 0 0 3px rgba(196,122,44,.18)}

  .ask{margin:24px 0 8px}
  .mode-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .mode-tab{padding:8px 13px;border:1px solid var(--line);border-radius:16px;background:rgba(231,240,251,.85);color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px}
  .mode-tab.active{background:linear-gradient(135deg,var(--moss-d),var(--moss));border-color:transparent;color:#fff;box-shadow:0 6px 14px rgba(47,110,207,.16)}
  .ask label{display:block;font-size:13px;color:var(--muted);margin-bottom:9px}
  .field{display:flex;gap:10px;flex-wrap:wrap}
  .field input{flex:1;min-width:240px;padding:14px 16px;font-size:15px;border:1.5px solid var(--line);border-radius:12px;background:rgba(255,255,255,.96);color:var(--ink);font-family:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.8);appearance:none;-webkit-appearance:none}
  .field input::-webkit-list-button{display:none}
  .field input:focus{outline:none;border-color:var(--moss)}
  .field button{padding:14px 22px;font-size:14px;font-weight:600;border:none;border-radius:12px;background:linear-gradient(135deg,var(--moss-d),var(--moss));color:#fff;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s}
  .field button:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(47,110,207,.2)}
  .field button:disabled{opacity:.5;cursor:not-allowed}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{font-size:12px;padding:7px 12px;border-radius:16px;cursor:pointer;background:rgba(231,240,251,.92);border:1px solid var(--line);color:var(--muted);transition:.15s}
  .chip:hover{background:linear-gradient(135deg,var(--moss-d),var(--moss));color:#fff;border-color:transparent}

  /* 진행 로그 - 백엔드 실제 status 메시지 */
  .stream{margin:24px 0;display:none;background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:0 10px 28px rgba(16,32,56,.05)}
  .stream.on{display:block}
  .slog{display:flex;align-items:center;gap:11px;padding:7px 0;font-size:13.5px;color:var(--muted);opacity:0;animation:fade .3s forwards}
  @keyframes fade{to{opacity:1}}
  .slog .ic{width:18px;height:18px;flex-shrink:0;display:grid;place-items:center}
  .slog.done .ic{color:var(--moss)}
  .slog.cur{color:var(--ink)}
  .spin{width:12px;height:12px;border:2px solid var(--moss);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .results{margin:12px 0 56px}
  .result-type{display:flex;align-items:center;gap:9px;margin:4px 0 14px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:rgba(231,240,251,.72);font-size:12px;color:var(--muted)}
  .result-type b{padding:4px 9px;border-radius:12px;background:var(--moss-d);color:#fff;font-size:11px}
  .result-section{margin:17px 0 9px;font-size:13px;font-weight:700;color:var(--ink)}
  .result-section:first-of-type{margin-top:4px}
  .result-tools{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin:10px 0 14px;flex-wrap:wrap}
  .result-tools select,.result-tools button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:8px 10px;font:inherit;font-size:12px}
  .result-tools button{cursor:pointer;color:var(--moss-d);font-weight:600}
  .compare-table{width:100%;border-collapse:collapse;margin:12px 0 18px;background:#fff;border:1px solid var(--line);font-size:12px}
  .compare-table th,.compare-table td{padding:9px;border-bottom:1px solid var(--line);text-align:right}
  .compare-table th:first-child,.compare-table td:first-child{text-align:left}
  .source-note{margin-top:10px;font-size:11px;color:var(--muted)}
  .card-actions{display:flex;gap:8px;margin-top:12px}
  .card-actions button{padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--moss-d);font-size:11px;cursor:pointer}
  .watch-btn.saved{background:var(--moss-d);color:#fff}
  .card{background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;opacity:0;transform:translateY(14px);animation:rise .5s ease forwards;box-shadow:0 8px 22px rgba(16,32,56,.04)}
  @keyframes rise{to{opacity:1;transform:none}}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .stock{display:flex;align-items:baseline;gap:10px}
  .stock .nm{font-size:19px;font-weight:700;color:var(--ink)}
  .stock .tk{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .fit{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .fit span{font-size:11px;padding:4px 9px;border-radius:12px;background:rgba(79,142,232,.08);color:var(--moss-d);border:1px solid rgba(79,142,232,.16)}

  .score{text-align:right;flex-shrink:0}
  .score .num{font-family:"Georgia",serif;font-size:32px;font-weight:700;line-height:1;color:var(--moss)}
  .score .lab{font-size:11px;color:var(--muted);margin-top:3px}
  .gauge{width:96px;height:5px;background:var(--paper-2);border-radius:3px;margin-top:8px;overflow:hidden}
  .gauge i{display:block;height:100%;background:linear-gradient(90deg,#9fd0ff,var(--moss));border-radius:3px;width:0;transition:width .9s ease}

  .why{margin-top:16px;display:grid;gap:10px}
  .why-row{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:start}
  .why-row .k{font-size:11px;color:#5f8fdc;font-weight:700;padding-top:1px;text-transform:uppercase;letter-spacing:.05em}
  .why-row .v{font-size:13px;color:var(--ink);line-height:1.55}
  .why-row .v b{color:var(--moss-d)}

  /* 교차검증 정량 테이블 - 차별점 */
  .matches{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
  .matches .mh{font-size:12px;color:var(--muted);margin-bottom:9px}
  .mrow{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:12.5px}
  .mrow .mf{width:128px;font-weight:600;color:var(--ink)}
  .mrow .mc{color:var(--muted);font-variant-numeric:tabular-nums}
  .mrow .mv{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--moss-d);font-weight:600}
  .mrow .ok{color:var(--moss)}

  .summary{margin-top:14px;padding:12px 14px;background:var(--paper-2);border-left:3px solid var(--moss);border-radius:0 8px 8px 0;font-size:13px;color:var(--ink)}
  .risk{margin-top:13px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .risk .rl{font-size:11.5px;color:var(--rose);font-weight:600}
  .risk span{font-size:11.5px;padding:4px 10px;border-radius:13px;background:rgba(219,95,111,.08);color:var(--rose);border:1px solid rgba(219,95,111,.2)}
  .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:16px}
  .metric{padding:11px;background:rgba(231,240,251,.84);border-radius:10px;border:1px solid rgba(205,219,240,.8)}
  .metric .mk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .metric .mv{font-family:"Georgia",serif;font-size:18px;color:var(--moss-d);margin-top:4px}
  .holdings{margin-top:12px;font-size:12px;color:var(--muted)}
  .holdings b{color:var(--ink)}
  .method{margin:16px 0;padding:11px 13px;border-radius:10px;background:var(--paper-2);font-size:12px;color:var(--muted)}
  .method.warn{background:rgba(219,95,111,.08);border:1px solid rgba(219,95,111,.2);color:var(--rose)}
  .detail-btn{margin-top:14px;padding:9px 14px;border:1px solid var(--moss);border-radius:9px;background:transparent;color:var(--moss-d);font-weight:600;cursor:pointer;font-family:inherit}
  .detail-btn:hover{background:linear-gradient(135deg,var(--moss-d),var(--moss));color:#fff}
  .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin:14px 0 18px}
  .back-btn{border:0;background:none;color:var(--moss-d);font-weight:600;cursor:pointer;padding:4px 0;font-family:inherit}
  .detail-title{font-family:"Pretendard","Segoe UI",-apple-system,sans-serif;font-size:26px;line-height:1.3;margin-top:8px;font-weight:700;letter-spacing:-.02em}
  .detail-section{background:rgba(255,255,255,.98);border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 8px 22px rgba(16,32,56,.04)}
  .detail-section h3{font-size:13px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--moss-d)}
  .chart-wrap{position:relative;height:260px;background:linear-gradient(180deg,#fff 0%,#f7fbff 100%);border:1px solid var(--line);border-radius:10px;padding:8px}
  .chart-wrap.drawdown{height:180px}
  .chart-wrap canvas{width:100%;height:100%;display:block}
  .chart-legend{display:flex;gap:18px;font-size:11.5px;color:var(--muted);margin:0 0 10px}
  .legend-line{display:inline-block;width:20px;height:2px;vertical-align:middle;margin-right:6px}
  .legend-line.strategy{background:var(--moss)}
  .legend-line.benchmark{background:#90a0b9}
  .allocation{display:grid;gap:9px}
  .allocation-row{display:grid;grid-template-columns:minmax(150px,1fr) 2fr 52px;gap:10px;align-items:center;font-size:12.5px}
  .allocation-bar{height:8px;background:var(--paper-2);border-radius:5px;overflow:hidden}
  .allocation-bar i{display:block;height:100%;background:linear-gradient(90deg,#b7ddff,var(--moss));border-radius:5px}
  .evidence-list{display:grid;gap:10px}
  .evidence-item{padding:12px;background:var(--paper-2);border-radius:8px}
  .evidence-item b{display:block;font-size:12px;margin-bottom:4px}
  .evidence-item p{font-size:11.5px;color:var(--muted)}
  .detail-copy{font-size:12.5px;color:var(--muted);line-height:1.65}
  .return-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .return-table th,.return-table td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:right}
  .return-table th:first-child,.return-table td:first-child{text-align:left}
  .return-table .positive{color:var(--moss-d)}
  .return-table .negative{color:var(--rose)}
  @media(max-width:720px){.metrics{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:620px){
    .wrap{padding:0 16px}
    header{padding:24px 0 18px}
    .lede{font-size:18px}
    .card{padding:18px}
    .detail-section{padding:16px}
    .detail-title{font-size:23px}
    .metrics{grid-template-columns:repeat(2,1fr)}
  }

  .foot{padding:24px 0 50px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);text-align:center}
  .empty{padding:50px 0;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>

  <header>

      <div class="tag">근거로 고르는 투자</div>
    </div>
    <p class="lede">주식 용어를 몰라도 괜찮아요.<br>말하는 대로 <em>논문과 재무 데이터</em>로 검증해 드릴게요.</p>

    <label for="q" id="askLabel">어떤 주식을 찾고 있나요?</label>
    <div class="field">

      <datalist id="stockOptions"></datalist>
      <button id="go">분석하기</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="stream" id="stream"></div>

  <div class="results" id="results">
    <div class="empty" id="empty">질문을 입력하면 근거와 함께 종목을 추천해 드려요.</div>

</div>

// ── 진짜 SSE 연결 ──
async function runLive(q){
  try{
    const res = await fetch(API+"/ai/recommend/stream",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user_input:q, risk_level:"medium", top_n:5}),
    });
    if(!res.ok || !res.body) return [];

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer="", finalData=[];

    while(true){
      const {value,done} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value,{stream:true});
      // SSE: "data: {...}\n\n" 단위로 파싱
      let parts = buffer.split("\n\n");
      buffer = parts.pop();
      for(const part of parts){
        const line = part.trim();
        if(!line.startsWith("data:")) continue;
        const jsonStr = line.slice(5).trim();
        if(!jsonStr) continue;
        let obj;
        try{ obj=JSON.parse(jsonStr); }catch(e){ continue; }

        if(obj.status==="processing"){
          pushLog(obj.message || "처리 중…");
        }else if(obj.status==="complete"){
          finalData = obj.data || [];
        }else if(obj.status==="error"){
          pushLog("⚠ "+(obj.message||"오류"));
          return [];
        }
      }
    }
    return finalData;
  }catch(e){
    return [];
  }
}

// ── Mock (안전망) ──
async function runMock(q){
  const steps=["질문 의도 파악 및 벡터 변환 중…","RAG 논문 DB · 재무 DB 교차 검색 중…","교차 검증 및 신뢰도 계산 중…"];
  for(const s of steps){ pushLog(s); await sleep(s.includes("교차 검색")?850:550); }
  return mockData(q);
}

function mockData(q){
  const normalizeStockTerm=value=>String(value||"").toLowerCase().replace(/[^0-9a-z가-힣]/g,"");
  const similarity=(a,b)=>{
    const rows=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
    for(let i=0;i<=a.length;i++)rows[i][0]=i;
    for(let j=0;j<=b.length;j++)rows[0][j]=j;
    for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++){
      rows[i][j]=Math.min(rows[i-1][j]+1,rows[i][j-1]+1,rows[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    }
    return 1-rows[a.length][b.length]/Math.max(a.length,b.length,1);
  };
  const normalizedQuery=normalizeStockTerm(q);
  let directMatches=STOCK_CATALOG.map(([ticker,name,aliases])=>{
    const matches=[name,ticker,...aliases].map(normalizeStockTerm)
      .filter(candidate=>candidate&&normalizedQuery.includes(candidate))
      .map(candidate=>[normalizedQuery===candidate?0:1,normalizedQuery.indexOf(candidate),-candidate.length]);
    if(!matches.length)return null;
    matches.sort((a,b)=>a[0]-b[0]||a[1]-b[1]||a[2]-b[2]);
    return {ticker,name,rank:matches[0]};
  }).filter(Boolean);
  const hasExactStock=directMatches.some(item=>item.rank[0]===0);
  if(hasExactStock){
    directMatches=directMatches.filter(item=>item.rank[0]===0);
  }

  if(!hasExactStock){
    const entity=ENTITY_GROUPS.map(group=>{
      const lengths=group.keywords.map(normalizeStockTerm)
        .filter(keyword=>keyword&&(
          GENERIC_GROUP_KEYWORDS.has(keyword)
            ?normalizedQuery===keyword
            :normalizedQuery.includes(keyword)
        ))
        .map(keyword=>keyword.length);
      return lengths.length?{group,length:Math.max(...lengths)}:null;
    }).filter(Boolean).sort((a,b)=>b.length-a.length)[0]?.group;
    if(entity){
      const byTicker=new Map(STOCK_CATALOG.map(([ticker,name])=>[ticker,name]));
      return entity.tickers.slice(0,5).map(ticker=>{
        const name=byTicker.get(ticker)||ticker;
        return mk(name,ticker,0,70,["인물·기업집단 연관 검색"],
          `검색어를 ${entity.label} 연관 키워드로 해석했습니다. 관계 기준일은 ${entity.basisDate}입니다.`,
          `${entity.label} 연관 종목으로 분류된 검색 결과입니다.`,
          "인물·기업집단 연관성은 투자 매력도나 매수 의견을 의미하지 않습니다.",
          `${name}(${ticker}) — ${entity.label} 연관 검색 결과`,
          ["기업집단 연관 검색 결과이며 투자 추천 순위가 아닙니다.","계열 관계와 지배구조는 변경될 수 있습니다."],
          []);
      });
    }
  }

  if(!directMatches.length){
    const terms=[normalizedQuery,...String(q).split(/[^0-9A-Za-z가-힣]+/).map(normalizeStockTerm)]
      .filter(term=>term.length>=3&&!["분석","검색","주가","종목","추천"].includes(term));
    const typo=STOCK_CATALOG.map(([ticker,name,aliases])=>{
      let score=0;
      for(const candidateRaw of [name,...aliases]){
        const candidate=normalizeStockTerm(candidateRaw);
        if(candidate.length<3)continue;
        for(const term of terms){
          const next=(candidate.startsWith(term)||term.startsWith(candidate))
            ?Math.min(term.length,candidate.length)/Math.max(term.length,candidate.length)
            :similarity(term,candidate);
          score=Math.max(score,next);
        }
      }
      return {ticker,name,score};
    }).filter(item=>item.score>=.72).sort((a,b)=>b.score-a.score||b.name.length-a.name.length)[0];
    if(typo)directMatches=[{ticker:typo.ticker,name:typo.name,rank:[2,0,-typo.name.length]}];
  }

  const direct=directMatches.sort((a,b)=>
    a.rank[0]-b.rank[0]||a.rank[1]-b.rank[1]||a.rank[2]-b.rank[2]
  ).slice(0,5).map(({ticker,name})=>
    mk(name,ticker,0,55,["직접 종목명 검색"],
      "사용자가 종목명 또는 종목코드를 직접 지정했습니다.",
      "현재 데모 모드에서는 종목 기본정보만 표시합니다.",
      "검색어와 종목명 또는 별칭이 일치하여 우선 표시한 결과입니다.",
      `${name}(${ticker}) 직접 검색 결과입니다.`,
      ["직접 검색 결과이며 매수 추천 순위가 아닙니다.","실시간 재무 지표는 FastAPI 연결 시 제공됩니다."],
      [])
  );
  const compareRequested=direct.length>=2&&/비교|vs|대비|중에|중에서/i.test(q);
  if(compareRequested){
    direct.forEach(item=>{
      item.matched_strategies=["종목 비교"];
      item.why_this_stock.match_summary=`${direct.length}개 종목을 동일한 지표 기준으로 비교합니다.`;
    });
    return direct;
  }
  const conditionRequested=direct.length===1&&/배당|저평가|가치|성장|안정|변동성|모멘텀|추세|부채|수익성/i.test(q);
  if(conditionRequested){
    direct[0].matched_strategies=["종목 조건 분석"];
    direct[0].why_this_stock.paper_basis="검색한 종목과 함께 입력한 투자 조건을 분석합니다.";
    direct[0].why_this_stock.match_summary="현재 확보된 재무·가격 데이터로 조건 충족 여부를 확인합니다.";
    return direct;
  }
  if(direct.length===1){
    const target=direct[0];
    const byTicker=new Map(STOCK_CATALOG.map(([ticker,name])=>[ticker,name]));
    const peers=[];
    STOCK_PEER_GROUPS.filter(group=>group.includes(target.ticker)).forEach(group=>{
      group.forEach(ticker=>{
        if(ticker!==target.ticker&&!peers.includes(ticker))peers.push(ticker);

        `${target.name}과 같은 업종·사업군 후보로 분류했습니다.`,
        `${target.name} 검색 결과와 함께 비교할 수 있는 유사 종목입니다.`,
        "업종·사업군을 기준으로 선정한 비교 후보입니다.",
        `${target.name}과 비교해 볼 유사 종목: ${name}(${ticker})`,
        ["유사 업종 분류는 투자 성과의 유사성을 보장하지 않습니다."],
        []));
    });
  }
  if(direct.length) return direct;

  const isGrowth=/성장|크는|테슬라|빠르/.test(q);
  const isDiv=/배당|안정|안전|부채|우량/.test(q);
  if(isGrowth){
    return [
      mk("에코프로비엠","247540",91,84,["고성장 모멘텀","2차전지 밸류체인"],
        "2차전지 양극재 수요 성장 논문에서 매출성장률 상위군의 초과수익이 확인됨.",
        "현재 매출성장률 38%, 영업이익률 11%로 고성장 조건 충족.",
        "고성장 팩터 조건 3개 중 3개 충족. 변동성 지표만 주의.",
        "빠르게 크는 성장주 조건에 부합하지만 가격 변동이 큰 점은 감안하세요.",

      mk("HLB","028300",78,71,["바이오 성장","신약 모멘텀"],
        "신약 파이프라인 가치평가 논문 기준 임상 진입 기업의 기대수익 구간에 해당.",
        "R&D 비중과 파이프라인 진행도가 높음.",

// Mock 헬퍼 → 백엔드 RecommendationResult와 동일 구조
function mk(name,ticker,rec,conf,fit,paper,status,match,summary,risks,matchRows){
  return {
    name,ticker,recommendation_score:rec,confidence_score:conf,
    matched_strategies:fit,
    why_this_stock:{paper_basis:paper,current_status:status,match_summary:match},
    match_results:(matchRows||[]).map(m=>({factor:m.factor,paper_condition:m.cond,stock_value:m.val,is_match:m.ok,gap:0})),
    simple_summary:summary,risk_factors:risks,evidence:[],data_date:"2026-06-24T00:00:00",
    data_sources:["가격·모멘텀: 데모 스냅샷","재무지표: 데모 보완"]
  };
}

// ── 렌더 ──
function render(list,preserve=false){
  const box=document.getElementById("results");
  box.innerHTML="";
  if(!list||!list.length){
    box.innerHTML=`<div class="empty">조건에 맞는 종목을 찾지 못했습니다.<br>
      <small>인식한 검색어: ${esc(CURRENT_STOCK_QUERY||"-")} · 조건을 하나 줄이거나 기준을 완화해 보세요.</small></div>`;
    return;
  }
  if(!preserve)CURRENT_STOCK_RESULTS=[...list];
  const strategies=list.flatMap(item=>item.matched_strategies||[]);
  const type=strategies.includes("인물·기업집단 연관 검색")
    ?["기업집단 연관 검색","인물·그룹 키워드로 연결된 종목입니다."]
    :strategies.includes("종목 비교")
      ?["종목 비교","선택한 종목을 동일한 재무·가격 지표로 비교합니다."]
    :strategies.includes("종목 조건 분석")
      ?["종목 조건 분석","검색한 종목이 요청 조건을 충족하는지 분석합니다."]
    :strategies.includes("유사 종목 추천")
      ?["직접 검색 + 유사 종목","검색한 종목과 같은 업종·사업군의 비교 후보를 함께 보여드립니다."]
    :strategies.includes("직접 종목명 검색")
      ?["직접 종목 검색","종목명·코드·유사 검색어로 찾은 결과입니다."]
      :["퀀트 추천","논문과 재무 팩터를 바탕으로 산출한 결과입니다."];
  const dataDates=list.map(item=>item.data_date).filter(Boolean).sort();
  const dataDate=dataDates.length?` · 데이터 ${formatDate(dataDates[dataDates.length-1])} 기준`:"";
  box.insertAdjacentHTML("beforeend",`<div class="result-type"><b>${esc(type[0])}</b><span>${esc(type[1]+dataDate)}</span></div>`);
  box.insertAdjacentHTML("beforeend",`<div class="result-tools">
    <label>정렬 <select id="stockSort"><option value="default">기본순</option><option value="score">추천점수순</option><option value="confidence">신뢰도순</option><option value="name">이름순</option></select></label>
    <label>필터 <select id="stockFilter"><option value="all">전체</option><option value="matched">충족 조건 있음</option><option value="watched">관심 종목만</option></select></label>
    <button id="showWatchlist">관심 종목 (${getWatchlist().length})</button>
  </div>`);
  if(strategies.includes("종목 비교")){
    const value=(item,label)=>{
      const row=(item.match_results||[]).find(match=>match.factor===label);
      return row?fmtVal(row.stock_value):"-";
    };
    box.insertAdjacentHTML("beforeend",`<table class="compare-table"><thead><tr><th>종목</th><th>PBR</th><th>PER</th><th>ROE</th><th>12개월 모멘텀</th><th>신뢰도</th></tr></thead><tbody>
      ${list.map(item=>`<tr><td>${esc(item.name)} <small>${esc(item.ticker)}</small></td><td>${value(item,"PBR")}</td><td>${value(item,"PER")}</td><td>${value(item,"ROE")}</td><td>${value(item,"12개월 모멘텀")}</td><td>${num(item.confidence_score)}</td></tr>`).join("")}
    </tbody></table>`);
  }
  let lastSection="";
  list.forEach((d,idx)=>{
    const itemStrategies=d.matched_strategies||[];
    const section=itemStrategies.includes("유사 종목 추천")?"비슷한 종목":strategies.includes("유사 종목 추천")?"검색한 종목":"";
    if(section&&section!==lastSection){
      box.insertAdjacentHTML("beforeend",`<div class="result-section">${esc(section)}</div>`);
      lastSection=section;
    }
    const w=d.why_this_stock||{};
    const fit=itemStrategies.map(s=>`<span>${esc(trim(s,28))}</span>`).join("");
    const risks=(d.risk_factors||[]).map(s=>`<span>${esc(s)}</span>`).join("");
    const conf=Math.round(d.confidence_score||0);
    const direct=itemStrategies.includes("직접 종목명 검색");
    const similar=itemStrategies.includes("유사 종목 추천");
    const entity=itemStrategies.includes("인물·기업집단 연관 검색");
    const comparison=itemStrategies.includes("종목 비교");
    const scoreHtml=(direct||similar||entity||comparison)
      ?`<div class="score"><div class="num" style="font-size:18px">${comparison?"비교":direct?"조회":similar?"비교":"연관"}</div><div class="lab">${comparison?"비교 대상":direct?"검색한 종목":similar?"유사 종목":"기업집단"}</div></div>`
      :`<div class="score"><div class="num">${Math.round(d.recommendation_score||0)}</div><div class="lab">추천 점수 · 신뢰도 ${conf}</div><div class="gauge"><i data-w="${conf}"></i></div></div>`;
    const mr=(d.match_results||[]).filter(m=>m&&m.factor);
    const matchHtml=mr.length?`<div class="matches"><div class="mh">재무 교차검증</div>${mr.map(m=>`<div class="mrow"><span class="mf">${esc(m.factor)}</span><span class="mc">기준 ${esc(m.paper_condition||"")}</span><span class="mv ${m.is_match?'ok':''}">${m.is_match?'✓ ':''}${fmtVal(m.stock_value)}</span></div>`).join("")}</div>`:"";
    const sources=(d.data_sources||[]).length?`<div class="source-note">데이터 구성 · ${(d.data_sources||[]).map(esc).join(" · ")}</div>`:"";
    const el=document.createElement("div");
    el.className="card"; el.style.animationDelay=(idx*.1)+"s";
    el.innerHTML=`<div class="card-top"><div><div class="stock"><span class="nm">${esc(d.name)}</span><span class="tk">${esc(d.ticker)}</span></div><div class="fit">${fit}</div></div>${scoreHtml}</div>
      <div class="why"><div class="why-row"><div class="k">분석 근거</div><div class="v">${esc(w.paper_basis||"")}</div></div><div class="why-row"><div class="k">현재 상태</div><div class="v">${esc(w.current_status||"")}</div></div><div class="why-row"><div class="k">판정</div><div class="v">${esc(w.match_summary||"")}</div></div></div>
      ${matchHtml}<div class="summary">${esc(d.simple_summary||"")}</div>${sources}${risks?`<div class="risk"><span class="rl">유의</span>${risks}</div>`:""}
      <div class="card-actions"><button class="watch-btn ${isWatched(d.ticker)?'saved':''}" data-ticker="${esc(d.ticker)}">${isWatched(d.ticker)?'관심 종목 해제':'관심 종목 추가'}</button></div>`;
    box.appendChild(el);
  });
  document.getElementById("stockSort").onchange=event=>{
    const value=event.target.value, next=[...CURRENT_STOCK_RESULTS];
    if(value==="score")next.sort((a,b)=>(b.recommendation_score||0)-(a.recommendation_score||0));
    if(value==="confidence")next.sort((a,b)=>(b.confidence_score||0)-(a.confidence_score||0));
    if(value==="name")next.sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    render(next,true); document.getElementById("stockSort").value=value;
  };
  document.getElementById("stockFilter").onchange=event=>{
    const value=event.target.value;
    let next=[...CURRENT_STOCK_RESULTS];
    if(value==="matched")next=next.filter(item=>(item.match_results||[]).some(row=>row.is_match));
    if(value==="watched")next=next.filter(item=>isWatched(item.ticker));
    render(next,true);
    if(document.getElementById("stockFilter"))document.getElementById("stockFilter").value=value;
  };
  document.getElementById("showWatchlist").onclick=()=>{
    const saved=getWatchlist();
    if(!saved.length){alert("저장된 관심 종목이 없습니다.");return;}
    document.getElementById("q").value=saved.map(item=>item.name).join(" ");
  };
  box.querySelectorAll(".watch-btn").forEach(button=>button.onclick=()=>{
    const item=list.find(row=>row.ticker===button.dataset.ticker);
    if(!item)return; toggleWatch(item);
    button.classList.toggle("saved",isWatched(item.ticker));
    button.textContent=isWatched(item.ticker)?"관심 종목 해제":"관심 종목 추가";
    document.getElementById("showWatchlist").textContent=`관심 종목 (${getWatchlist().length})`;
  });
  requestAnimationFrame(()=>document.querySelectorAll(".gauge i").forEach(i=>{i.style.width=i.dataset.w+"%";}));
}

      <div class="metrics">
        ${metric("연환산 수익률",pct(m.cagr))}
        ${metric("최대 낙폭",pct(m.mdd))}
        ${metric("Sharpe",num(m.sharpe))}
        ${metric(`${benchmarkName} 대비`,pct(s.excess_cagr))}
      </div>
      <button class="detail-btn" data-strategy-id="${esc(s.id)}">상세 분석</button>
      <label class="detail-btn" style="display:inline-block;margin-left:7px"><input type="checkbox" class="strategy-compare-check" data-strategy-id="${esc(s.id)}" ${STRATEGY_COMPARE_IDS.has(s.id)?"checked":""}> 비교 선택</label>
    `;
    box.appendChild(el);

  box.querySelectorAll(".detail-btn").forEach(button=>{
    if(button.tagName==="BUTTON")button.onclick=()=>openStrategyDetail(button.dataset.strategyId);

    if(check.checked&&STRATEGY_COMPARE_IDS.size>=3){check.checked=false;alert("전략 비교는 최대 3개까지 가능합니다.");return;}
    if(check.checked)STRATEGY_COMPARE_IDS.add(check.dataset.strategyId);

  });

    if(value==="sharpe")next.strategies.sort((a,b)=>(b.metrics?.sharpe||0)-(a.metrics?.sharpe||0));
    renderStrategies(next); document.getElementById("strategySort").value=value;
  };
  document.getElementById("strategyRisk").onchange=event=>{
    const value=event.target.value;
    const next={...payload,strategies:value==="all"?[...list]:list.filter(item=>item.risk_level===value)};
    renderStrategies(next);
    if(document.getElementById("strategyRisk"))document.getElementById("strategyRisk").value=value;
  };
}

      <div class="holdings"><b>NAV 괴리율</b> ${pct(e.nav_deviation)} · <b>거래대금</b> ${formatAmount(e.trading_value)} · <b>순자산</b> ${formatAmount(e.market_cap)}</div>
      <div class="holdings">데이터 커버리지 ${num(e.data_coverage)}% · 레버리지/인버스 제외</div>
    `;
    box.appendChild(el);
  });
}
function metric(k,v){return `<div class="metric"><div class="mk">${k}</div><div class="mv">${v}</div></div>`}
function formatDate(value){
  const date=new Date(value);
  return Number.isNaN(date.getTime())?String(value):date.toLocaleDateString("ko-KR");
}
function pct(v){return v==null||v===""?"-":`${num(v)}%`}
function num(v){const n=Number(v);return Number.isFinite(n)?n.toFixed(2):"-"}
function formatAmount(v){const n=Number(v);if(!Number.isFinite(n))return "-";return n>=10000?(n/10000).toFixed(1)+"만":Math.round(n).toLocaleString()}
function openStrategyDetail(id){

async function handleStrategyHash(){
  const match=location.hash.match(/^#strategy=([^:]+):(.+)$/);
  if(!match){
    if(LAST_STRATEGY_PAYLOAD)renderStrategies(LAST_STRATEGY_PAYLOAD);
    return;
  }
  const assetType=decodeURIComponent(match[1]);
  const id=decodeURIComponent(match[2]);
  MODE=assetType==="etf"?"etf_strategy":"strategy";
  document.querySelectorAll(".mode-tab").forEach(tab=>{
    tab.classList.toggle("active",tab.dataset.mode===MODE);
  });
  document.getElementById("askLabel").textContent="어떤 투자 전략을 찾고 있나요?";
  document.getElementById("q").placeholder="예: 하락장에서 안정적인 전략 추천해줘";
  renderChips(assetType==="etf"?etfStrategyExamples:strategyExamples);
  if(!LAST_STRATEGY_PAYLOAD||LAST_STRATEGY_TYPE!==assetType){
    try{
      const res=await fetch(API+`/ai/backtest/strategies?asset_type=${assetType}&limit=10&query=${encodeURIComponent(id)}`);
      if(!res.ok) return;
      LAST_STRATEGY_PAYLOAD=await res.json();
      LAST_STRATEGY_TYPE=assetType;
    }catch(e){return;}
  }
  const strategy=(LAST_STRATEGY_PAYLOAD.strategies||[]).find(item=>item.id===id);
  if(strategy) renderStrategyDetail(strategy,LAST_STRATEGY_PAYLOAD,assetType);
}

function drawBacktestChart(canvas,strategyRows,benchmarkRows,type){
  if(!canvas||strategyRows.length<2)return;
  const rect=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(rect.width*dpr);
  canvas.height=Math.round(rect.height*dpr);
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const width=rect.width,height=rect.height;
  const pad={left:58,right:18,top:16,bottom:30};
  const plotW=width-pad.left-pad.right,plotH=height-pad.top-pad.bottom;
  const equityValues=rows=>rows.map(x=>(Number(x.value)-1)*100);
  const drawdownValues=rows=>{
    let peak=-Infinity;
    return rows.map(x=>{
      const value=Number(x.value);
      peak=Math.max(peak,value);
      return (value/peak-1)*100;
    });
  };
  const strategy=type==="drawdown"?drawdownValues(strategyRows):equityValues(strategyRows);
  const benchmark=type==="equity"?equityValues(benchmarkRows):[];
  const all=[...strategy,...benchmark,0].filter(Number.isFinite);
  let min=Math.min(...all),max=Math.max(...all);
  const margin=Math.max((max-min)*.08,2);
  min-=margin;max+=margin;
  if(type==="drawdown")max=0;
  const span=max-min||1;
  const x=i=>pad.left+i/(strategy.length-1)*plotW;
  const y=v=>pad.top+(max-v)/span*plotH;

  ctx.font='11px "Segoe UI",sans-serif';
  ctx.fillStyle="#6c6557";
  ctx.strokeStyle="#e5e0d4";
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const value=max-(span*i/4),py=y(value);
    ctx.beginPath();ctx.moveTo(pad.left,py);ctx.lineTo(width-pad.right,py);ctx.stroke();
    ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText(`${value.toFixed(0)}%`,pad.left-8,py);
  }
  const dates=strategyRows.map(x=>x.date);
  for(let i=0;i<=4;i++){
    const index=Math.min(dates.length-1,Math.round((dates.length-1)*i/4));
    const px=x(index);
    ctx.textAlign=i===0?"left":i===4?"right":"center";
    ctx.textBaseline="top";
    ctx.fillText(dates[index].slice(0,7),px,height-pad.bottom+8);
  }
  const drawLine=(values,color,dashed=false)=>{
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
    ctx.setLineDash(dashed?[6,4]:[]);
    values.forEach((value,i)=>{if(i===0)ctx.moveTo(x(i),y(value));else ctx.lineTo(x(i),y(value));});
    ctx.stroke();ctx.setLineDash([]);
  };
  if(type==="drawdown"){
    ctx.beginPath();
    strategy.forEach((value,i)=>{if(i===0)ctx.moveTo(x(i),y(0));ctx.lineTo(x(i),y(value));});
    ctx.lineTo(x(strategy.length-1),y(0));ctx.closePath();
    ctx.fillStyle="rgba(168,68,58,.18)";ctx.fill();
    drawLine(strategy,"#a8443a");
  }else{
    if(benchmark.length===strategy.length)drawLine(benchmark,"#888",true);
    drawLine(strategy,"#2f6b4f");
    if(min<0&&max>0){
      ctx.beginPath();ctx.strokeStyle="#b9b3a3";ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.moveTo(pad.left,y(0));ctx.lineTo(width-pad.right,y(0));ctx.stroke();ctx.setLineDash([]);
    }
  }
}
function annualReturnsTable(strategyRows,benchmarkRows,benchmarkName){
  const yearly=rows=>{
    const grouped={},values=rows.map(row=>Number(row.value));
    rows.forEach((row,index)=>{
      const year=String(row.date).slice(0,4);
      const value=values[index],previous=index===0?1:values[index-1];
      if(!Number.isFinite(value)||!Number.isFinite(previous)||previous===0)return;
      const monthly=value/previous;
      grouped[year]=(grouped[year]||1)*monthly;
    });
    return Object.fromEntries(Object.entries(grouped).map(([year,v])=>[year,(v-1)*100]));
  };
  const strategy=yearly(strategyRows),benchmark=yearly(benchmarkRows);
  const years=[...new Set([...Object.keys(strategy),...Object.keys(benchmark)])].sort();
  const cell=value=>{
    const cls=value>0?"positive":value<0?"negative":"";
    return `<td class="${cls}">${pct(value)}</td>`;
  };
  return `<table class="return-table">
    <thead><tr><th>연도</th><th>전략</th><th>${esc(benchmarkName)}</th><th>초과</th></tr></thead>
    <tbody>${years.map(year=>`<tr>
      <td>${year}</td>${cell(strategy[year])}${cell(benchmark[year])}${cell((strategy[year]||0)-(benchmark[year]||0))}
    </tr>`).join("")}</tbody>
  </table>`;
}
function esc(s){return String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function trim(s,n){s=String(s??"");return s.length>n?s.slice(0,n)+"…":s}
function fmtVal(v){if(v==null||v==="-")return "-";return typeof v==="number"?(Number.isInteger(v)?v:v.toFixed(1)):v}

      renderChips(MODE==="etf"?etfExamples:MODE==="etf_strategy"?etfStrategyExamples:strategy?strategyExamples:examples);

}
